<!DOCTYPE html>
<html>
<head>
    <style>
        :root {
            --bg-dark: #1e1e24;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --success: #10b981;
        }
        body {
            background: var(--bg-dark);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 30px;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 220px;
        }

        .lock-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        h2 {
            font-weight: 400;
            margin: 0 0 10px 0;
            text-align: center;
        }

        .subtitle {
            color: #888;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
            max-width: 280px;
        }

        .input-field {
            background: rgba(255,255,255,0.05);
            border: 1px solid #444;
            border-radius: 6px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            width: 280px;
            box-sizing: border-box;
            margin-bottom: 10px;
            text-align: center;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn {
            background: var(--accent);
            border: none;
            padding: 12px 40px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            margin: 5px;
        }
        .btn:hover { background: var(--accent-hover); }
        .btn-outline {
            background: transparent;
            border: 1px solid #444;
        }
        .btn-outline:hover {
            border-color: #666;
            background: rgba(255,255,255,0.05);
        }
        .btn-danger { background: var(--danger); }
        .btn-danger:hover { background: #dc2626; }
        .btn-success { background: var(--success); }
        .btn-success:hover { background: #059669; }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .error-msg {
            color: var(--danger);
            font-size: 12px;
            margin-top: 5px;
            height: 16px;
        }

        .hidden {
            display: none !important;
        }

        .step-indicator {
            font-size: 11px;
            color: #666;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="lock-icon" id="lock-icon">🔐</div>
    <div class="step-indicator hidden" id="step-indicator">Step 1 of 2</div>
    <h2 id="title">Enter Password</h2>
    <p class="subtitle" id="subtitle">Password required to continue</p>

    <div id="password-section">
        <input type="password" id="password-input" class="input-field" placeholder="Enter password" autofocus>
        <input type="password" id="confirm-input" class="input-field hidden" placeholder="Confirm password">
        <div class="error-msg" id="error-msg"></div>
    </div>

    <div id="confirm-section" class="hidden">
        <p style="color:#aaa; font-size:13px; margin-bottom:20px; text-align:center;">
            Hourly backups will stop running if you quit the application.
        </p>
    </div>

    <div class="buttons">
        <button class="btn btn-outline" id="cancel-btn">Cancel</button>
        <button class="btn" id="submit-btn">Continue</button>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        let mode = 'quit';
        let passwordSet = false;

        ipcRenderer.on('init-password-window', (event, data) => {
            mode = data.mode || 'quit';
            passwordSet = data.passwordSet || false;

            document.getElementById('confirm-input').classList.add('hidden');
            document.getElementById('password-input').placeholder = 'Enter password';

            if (mode === 'setup') {
                if (passwordSet) {
                    mode = 'change';
                    document.getElementById('step-indicator').classList.remove('hidden');
                    document.getElementById('step-indicator').innerText = 'Step 1 of 2: Verify Current Password';
                    document.getElementById('lock-icon').innerText = '🔐';
                    document.getElementById('title').innerText = 'Change Password';
                    document.getElementById('subtitle').innerText = 'Enter your current password to continue.';
                    document.getElementById('submit-btn').innerText = 'Verify';
                    document.getElementById('submit-btn').classList.add('btn-success');
                    document.getElementById('submit-btn').classList.remove('btn-danger');
                    document.getElementById('password-section').classList.remove('hidden');
                    document.getElementById('confirm-section').classList.add('hidden');
                } else {
                    ipcRenderer.send('open-password-set');
                }
            } else if (mode === 'quit') {
                document.getElementById('step-indicator').classList.add('hidden');
                if (passwordSet) {
                    document.getElementById('title').innerText = 'Enter Password to Quit';
                    document.getElementById('subtitle').innerText = 'The app is password protected to prevent accidental closing.';
                    document.getElementById('submit-btn').innerText = 'Quit';
                    document.getElementById('submit-btn').classList.add('btn-danger');
                    document.getElementById('submit-btn').classList.remove('btn-success');
                    document.getElementById('password-section').classList.remove('hidden');
                    document.getElementById('confirm-section').classList.add('hidden');
                } else {
                    document.getElementById('lock-icon').innerText = '⚠️';
                    document.getElementById('title').innerText = 'Quit Time Machine?';
                    document.getElementById('subtitle').innerText = 'Are you sure you want to quit?';
                    document.getElementById('submit-btn').innerText = 'Yes, Quit';
                    document.getElementById('submit-btn').classList.add('btn-danger');
                    document.getElementById('submit-btn').classList.remove('btn-success');
                    document.getElementById('password-section').classList.add('hidden');
                    document.getElementById('confirm-section').classList.remove('hidden');
                }
            } else if (mode === 'change') {
                document.getElementById('step-indicator').classList.remove('hidden');
                document.getElementById('step-indicator').innerText = 'Step 1 of 2: Verify Current Password';
                document.getElementById('lock-icon').innerText = '🔐';
                document.getElementById('title').innerText = 'Change Password';
                document.getElementById('subtitle').innerText = 'Enter your current password to continue.';
                document.getElementById('submit-btn').innerText = 'Verify';
                document.getElementById('submit-btn').classList.add('btn-success');
                document.getElementById('submit-btn').classList.remove('btn-danger');
                document.getElementById('password-section').classList.remove('hidden');
                document.getElementById('confirm-section').classList.add('hidden');
            } else if (mode === 'remove') {
                document.getElementById('step-indicator').classList.remove('hidden');
                document.getElementById('step-indicator').innerText = 'Verify Password';
                document.getElementById('lock-icon').innerText = '🔐';
                document.getElementById('title').innerText = 'Remove Password Protection';
                document.getElementById('subtitle').innerText = 'Enter your password to remove protection.';
                document.getElementById('submit-btn').innerText = 'Remove';
                document.getElementById('submit-btn').classList.add('btn-danger');
                document.getElementById('submit-btn').classList.remove('btn-success');
                document.getElementById('password-section').classList.remove('hidden');
                document.getElementById('confirm-section').classList.add('hidden');
            }
        });

        document.getElementById('submit-btn').addEventListener('click', submitAction);
        document.getElementById('cancel-btn').addEventListener('click', () => {
            ipcRenderer.send('password-window-cancel', { mode });
            window.close();
        });

        document.getElementById('password-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (mode === 'set-new-password') {
                    document.getElementById('confirm-input').focus();
                } else {
                    submitAction();
                }
            }
        });

        document.getElementById('confirm-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitAction();
        });

        function submitAction() {
            if (mode === 'quit' && !passwordSet) {
                ipcRenderer.send('confirm-quit-direct');
                return;
            }

            const password = document.getElementById('password-input').value;

            if (mode === 'set-new-password') {
                const confirm = document.getElementById('confirm-input').value;
                if (!password) {
                    document.getElementById('error-msg').innerText = 'Please enter a new password.';
                    return;
                }
                if (password.length < 4) {
                    document.getElementById('error-msg').innerText = 'Password must be at least 4 characters.';
                    return;
                }
                if (password !== confirm) {
                    document.getElementById('error-msg').innerText = 'Passwords do not match.';
                    return;
                }
                ipcRenderer.send('password-set-new', { password });
                return;
            }

            if (!password) {
                document.getElementById('error-msg').innerText = 'Please enter a password.';
                return;
            }
            ipcRenderer.send('password-submit', { password, mode });
        }

        ipcRenderer.on('password-error', (event, data) => {
            document.getElementById('error-msg').innerText = data.message || 'Incorrect password.';
            document.getElementById('password-input').value = '';
            document.getElementById('password-input').focus();
        });

        ipcRenderer.on('proceed-to-new-password', () => {
            document.getElementById('step-indicator').innerText = 'Step 2 of 2: Set New Password';
            document.getElementById('title').innerText = 'Enter New Password';
            document.getElementById('subtitle').innerText = 'Enter and confirm your new password (min 4 chars).';
            document.getElementById('password-input').value = '';
            document.getElementById('password-input').placeholder = 'Enter new password';
            document.getElementById('confirm-input').classList.remove('hidden');
            document.getElementById('confirm-input').value = '';
            document.getElementById('error-msg').innerText = '';
            document.getElementById('submit-btn').innerText = 'Set Password';
            document.getElementById('submit-btn').classList.add('btn-success');
            document.getElementById('password-input').focus();
            mode = 'set-new-password';
        });

        ipcRenderer.on('password-window-close', () => {
            window.close();
        });

        ipcRenderer.on('password-success', () => {
            document.getElementById('lock-icon').innerText = '✅';
            document.getElementById('title').innerText = 'Success!';
            document.getElementById('subtitle').innerText = 'Operation completed successfully.';
            document.getElementById('password-section').classList.add('hidden');
            document.getElementById('confirm-section').classList.add('hidden');
            document.getElementById('submit-btn').innerText = 'Close';
            document.getElementById('submit-btn').onclick = () => window.close();
        });
    </script>
</body>
</html>
