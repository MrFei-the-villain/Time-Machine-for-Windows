<!DOCTYPE html>
<html>
<head>
    <style>
        :root {
            --bg-dark: #1e1e24;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
        }
        body { 
            background: var(--bg-dark); 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            padding: 30px;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 280px;
        }
        
        .lock-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        h2 {
            font-weight: 400;
            margin: 0 0 10px 0;
            text-align: center;
        }
        
        .subtitle {
            color: #888;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .input-field {
            background: rgba(255,255,255,0.05);
            border: 1px solid #444;
            border-radius: 6px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            width: 280px;
            box-sizing: border-box;
            margin-bottom: 12px;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .btn {
            background: var(--accent); 
            border: none; 
            padding: 12px 40px; 
            border-radius: 6px; 
            color: white; 
            cursor: pointer; 
            font-size: 14px;
            transition: background 0.2s;
            margin: 5px;
        }
        .btn:hover { background: var(--accent-hover); }
        .btn-success { background: var(--success); }
        .btn-success:hover { background: #059669; }
        .btn-outline { 
            background: transparent; 
            border: 1px solid #444; 
        }
        .btn-outline:hover { 
            border-color: #666; 
            background: rgba(255,255,255,0.05);
        }
        
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .error-msg {
            color: #ef4444;
            font-size: 12px;
            margin-top: 5px;
            height: 16px;
        }
        
        .success-msg {
            color: var(--success);
            font-size: 12px;
            margin-top: 5px;
            height: 16px;
        }
    </style>
</head>
<body>
    <div class="lock-icon">🔐</div>
    <h2>Set App Password</h2>
    <p class="subtitle">Protect the app from unauthorized closing</p>
    
    <input type="password" id="password-input" class="input-field" placeholder="Enter new password" autofocus>
    <input type="password" id="confirm-input" class="input-field" placeholder="Confirm new password">
    <div class="error-msg" id="error-msg"></div>
    
    <div class="buttons">
        <button class="btn btn-outline" id="cancel-btn">Cancel</button>
        <button class="btn btn-success" id="submit-btn">Set Password</button>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        
        document.getElementById('submit-btn').addEventListener('click', submitPassword);
        document.getElementById('cancel-btn').addEventListener('click', () => {
            ipcRenderer.send('password-set-cancel');
            window.close();
        });
        
        document.getElementById('confirm-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitPassword();
        });
        
        document.getElementById('password-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('confirm-input').focus();
            }
        });
        
        function submitPassword() {
            const password = document.getElementById('password-input').value;
            const confirm = document.getElementById('confirm-input').value;
            
            if (!password) {
                document.getElementById('error-msg').innerText = 'Please enter a password.';
                return;
            }
            if (password.length < 4) {
                document.getElementById('error-msg').innerText = 'Password must be at least 4 characters.';
                return;
            }
            if (password !== confirm) {
                document.getElementById('error-msg').innerText = 'Passwords do not match.';
                return;
            }
            
            ipcRenderer.send('password-set-submit', { password });
        }
        
        ipcRenderer.on('password-set-success', () => {
            document.getElementById('error-msg').className = 'success-msg';
            document.getElementById('error-msg').innerText = 'Password set successfully!';
            setTimeout(() => {
                window.close();
            }, 1000);
        });
        
        ipcRenderer.on('password-set-error', (event, data) => {
            document.getElementById('error-msg').innerText = data.message || 'Failed to set password.';
        });
    </script>
</body>
</html>
